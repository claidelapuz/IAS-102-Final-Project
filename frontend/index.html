<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Network Scanner Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: monospace; padding: 20px; }

  h1 { font-size: 22px; margin-bottom: 20px; color: #0f0; }

  /* ── Traffic Graph Section ── */
  .section { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 16px; margin-bottom: 20px; }
  .section h2 { font-size: 14px; color: #0cf; margin-bottom: 12px; letter-spacing: 1px; }

  .speed-row { display: flex; gap: 30px; margin-bottom: 12px; }
  .speed-box { text-align: center; }
  .speed-box .label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .speed-box .value { font-size: 22px; font-weight: bold; }
  .dl { color: #0cf; }
  .ul { color: #f80; }

  canvas { display: block; width: 100%; height: 150px; background: #000; border: 1px solid #333; border-radius: 4px; }

  .legend { display: flex; gap: 20px; margin-top: 8px; font-size: 11px; color: #888; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 3px; border-radius: 2px; display: inline-block; }

  /* ── Scanner Section ── */
  .controls { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 14px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: #888; }
  .field input { background: #000; border: 1px solid #444; color: #0cf; padding: 7px 10px; font-family: monospace; font-size: 13px; border-radius: 4px; width: 140px; outline: none; }
  .field input:focus { border-color: #0cf; }

  .btn { padding: 8px 24px; font-size: 14px; font-family: monospace; font-weight: bold; border: 2px solid #0f0; background: transparent; color: #0f0; border-radius: 4px; cursor: pointer; letter-spacing: 2px; transition: all 0.2s; }
  .btn:hover { background: #0f0; color: #000; }
  .btn.off { border-color: #f33; color: #f33; }
  .btn.off:hover { background: #f33; color: #fff; }

  .summary { font-size: 13px; margin-bottom: 10px; color: #0f0; min-height: 20px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; background: #222; color: #888; font-weight: normal; border-bottom: 1px solid #333; }
  td { padding: 8px 10px; border-bottom: 1px solid #222; }
  td:first-child { color: #0cf; }
  td:nth-child(2) { color: #0f0; }
  tr { animation: fadein 0.3s ease; }
  @keyframes fadein { from { opacity:0; transform: translateX(-6px); } to { opacity:1; transform: translateX(0); } }

  .empty { color: #555; padding: 20px 10px; text-align: center; font-size: 13px; }
  .status { font-size: 12px; color: #555; margin-top: 10px; }
</style>
</head>
<body>

<h1>⬡ Network Scanner Dashboard</h1>

<!-- TRAFFIC GRAPH -->
<div class="section">
  <h2>▶ LIVE INTERNET TRAFFIC</h2>
  <div class="speed-row">
    <div class="speed-box">
      <div class="label">↓ DOWNLOAD</div>
      <div class="value dl" id="dlVal">0.00 Kbps</div>
    </div>
    <div class="speed-box">
      <div class="label">↑ UPLOAD</div>
      <div class="value ul" id="ulVal">0.00 Kbps</div>
    </div>
  </div>
  <canvas id="graph"></canvas>
  <div class="legend">
    <span><span class="dot" style="background:#0cf"></span> Download</span>
    <span><span class="dot" style="background:#f80"></span> Upload</span>
  </div>
</div>

<!-- PORT SCANNER -->
<div class="section">
  <h2>▶ PORT SCANNER</h2>
  <div class="controls">
    <div class="field">
      <label>TARGET IP</label>
      <input id="host" value="127.0.0.1"/>
    </div>
    <div class="field">
      <label>PORT START</label>
      <input id="ps" type="number" value="1"/>
    </div>
    <div class="field">
      <label>PORT END</label>
      <input id="pe" type="number" value="1024"/>
    </div>
    <button class="btn" id="scanBtn" onclick="toggleScan()">ON</button>
  </div>

  <div class="summary" id="summary">Click ON to start scanning.</div>

  <table>
    <thead>
      <tr><th>PORT</th><th>STATE</th><th>SERVICE</th></tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="3" class="empty">No results yet.</td></tr>
    </tbody>
  </table>

  <div class="status" id="statusMsg"></div>
</div>

<script>
// ── Graph setup ───────────────────────────────────────────────
const canvas = document.getElementById('graph');
const ctx    = canvas.getContext('2d');
const N      = 60;
const dlArr  = new Array(N).fill(0);
const ulArr  = new Array(N).fill(0);

function resizeCanvas() {
  canvas.width  = canvas.parentElement.clientWidth - 32;
  canvas.height = 150;
  draw();
}

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    const y = (H / 4) * i;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  const peak = Math.max(...dlArr, ...ulArr, 10);

  function line(data, color) {
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 6;
    ctx.shadowColor = color;
    data.forEach((v, i) => {
      const x = (i / (N - 1)) * W;
      const y = H - (v / peak) * (H - 10) - 4;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  line(dlArr, '#0cf');
  line(ulArr, '#f80');
}

function fmtKbps(v) {
  if (v >= 1024) return (v / 1024).toFixed(2) + ' Mbps';
  return v.toFixed(2) + ' Kbps';
}

// ── Socket ────────────────────────────────────────────────────
const socket = io('http://localhost:5000', { transports: ['websocket'] });

socket.on('connect', () => {
  document.getElementById('statusMsg').textContent = '● Connected to backend.';
});
socket.on('disconnect', () => {
  document.getElementById('statusMsg').textContent = '○ Disconnected.';
});
socket.on('connect_error', () => {
  document.getElementById('statusMsg').textContent = '✗ Cannot reach backend. Run server.py first.';
});

// ── Traffic updates ───────────────────────────────────────────
socket.on('traffic_update', (data) => {
  dlArr.push(data.dl); dlArr.shift();
  ulArr.push(data.ul); ulArr.shift();
  document.getElementById('dlVal').textContent = fmtKbps(data.dl);
  document.getElementById('ulVal').textContent = fmtKbps(data.ul);
  draw();
});

// ── Scanner ───────────────────────────────────────────────────
let scanning = false;
let openCount = 0;

function toggleScan() {
  if (!scanning) {
    startScan();
  } else {
    stopScan();
  }
}

function startScan() {
  const host = document.getElementById('host').value.trim() || '127.0.0.1';
  const ps   = parseInt(document.getElementById('ps').value) || 1;
  const pe   = parseInt(document.getElementById('pe').value) || 1024;

  // clear table
  document.getElementById('tbody').innerHTML = '';
  openCount = 0;
  document.getElementById('summary').textContent = 'Scanning ' + host + '...';

  scanning = true;
  document.getElementById('scanBtn').textContent = 'OFF';
  document.getElementById('scanBtn').classList.add('off');

  socket.emit('start_scan', { host, port_start: ps, port_end: pe });
}

function stopScan() {
  socket.emit('stop_scan');
  scanning = false;
  document.getElementById('scanBtn').textContent = 'ON';
  document.getElementById('scanBtn').classList.remove('off');
  document.getElementById('summary').textContent = 'Scan stopped. ' + openCount + ' open port(s) found.';
}

socket.on('port_found', (data) => {
  openCount++;
  document.getElementById('summary').textContent = 'Scanning... ' + openCount + ' open port(s) found so far.';

  const tbody = document.getElementById('tbody');
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${data.port}</td><td>OPEN</td><td>${data.service}</td>`;
  tbody.appendChild(tr);
  tbody.scrollTop = tbody.scrollHeight;
});

socket.on('scan_complete', (data) => {
  scanning = false;
  document.getElementById('scanBtn').textContent = 'ON';
  document.getElementById('scanBtn').classList.remove('off');
  document.getElementById('summary').textContent = '✓ Scan complete — ' + data.total + ' open port(s) found.';
});

socket.on('scan_stopped', () => {
  scanning = false;
  document.getElementById('scanBtn').textContent = 'ON';
  document.getElementById('scanBtn').classList.remove('off');
});

// ── Boot ──────────────────────────────────────────────────────
window.addEventListener('resize', resizeCanvas);
window.addEventListener('load', resizeCanvas);
</script>
</body>
</html>
